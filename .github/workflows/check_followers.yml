name: Instagram Takipçi Kontrolü

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-followers:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests instaloader

    - name: Kontrol Kodunu Çalıştır
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        IG_USERNAME: ${{ secrets.IG_USERNAME }}
        IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
      run: python main.py

    - name: Değişiklikleri Repoya Commit Et
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        if [ -f follower_count.txt ]; then
          git add follower_count.txt
          git commit -m "Takipçi sayısı güncellendi [skip ci]" || echo "Değişiklik yok."
          git push
        else
          echo "follower_count.txt bulunamadı."
        fi
