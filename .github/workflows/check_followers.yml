name: Instagram Takipçi Kontrolü

on:
  schedule:
    # Her 6 saatte bir çalışır
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manuel tetikleme butonu ekler

jobs:
  check-followers:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Takipçi sayısını repoya commit edebilmek için gerekli izin

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests instaloader

    - name: Takipçi Kontrol Betiğini Çalıştır
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        INSTAGRAM_USER: ${{ secrets.INSTAGRAM_USER }}
      run: python main.py

    - name: Güncellenmiş Takipçi Sayısını Repoya Kaydet
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add follower_count.txt
        git commit -m "Takipçi sayısı güncellendi [skip ci]" || exit 0
        git push
